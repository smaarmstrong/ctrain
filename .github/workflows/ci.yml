name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  selftest:
    runs-on: ubuntu-latest
    container:
      image: gcc:14
      options: --cap-add SYS_PTRACE
    steps:
      - uses: actions/checkout@v4
      - name: Build the runner (warnings are errors)
        run: make ctrain
      - name: Unit tests (selection / spaced-repetition / lesson parser)
        run: make test
      - name: Runner smoke test
        run: ./ctrain list && ./ctrain help && ./ctrain train
      - name: Selftest every grader (solution passes, starter fails)
        run: ./selftest.sh
