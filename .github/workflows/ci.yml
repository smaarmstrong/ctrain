name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  selftest:
    runs-on: ubuntu-latest
    container:
      image: gcc:14
      options: --cap-add SYS_PTRACE
    steps:
      - uses: actions/checkout@v4
      - name: Build the runner (warnings are errors)
        run: make
      - name: Runner smoke test
        run: ./ctrain list && ./ctrain help
      - name: Selftest every grader (solution passes, starter fails)
        run: ./selftest.sh
